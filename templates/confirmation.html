{% extends 'base.html' %}
{% block content %}
<div class="container" style="text-align: center;">
    <div class="glass-panel success-panel">
        <h2 class="glow-text">Booking Confirmation Active</h2>
        <div class="margin-top-xl">
            <p>Authorized Grand Total</p>
            <h1 class="glow-text total-glow">${{ total_cost }}</h1>
        </div>
        <div class="glass-card margin-top-xl">
            <p>Your secure booking reference number is:</p>
            <h2 class="glow-text margin-top-lg">{{ ref_num }}</h2>
        </div>
        <div class="cta-group margin-top-xl">
            <button class="neon-btn" onclick="window.print()">Download Receipt</button>
            <a href="{{ url_for('index') }}" class="neon-btn">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}
